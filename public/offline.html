<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sin conexión - BarberCore</title>

        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #faf8f2;
                font-family: Arial, sans-serif;
                color: #1c1c1c;
            }

            .card {
                width: 90%;
                max-width: 420px;
                background: #ffffff;
                border: 1px solid #e5e0d6;
                border-radius: 18px;
                padding: 32px;
                text-align: center;
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            }

            .icon {
                width: 70px;
                height: 70px;
                margin: 0 auto 18px;
                border-radius: 50%;
                background: #c9a227;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #ffffff;
                font-size: 34px;
                font-weight: bold;
            }

            h1 {
                margin-bottom: 10px;
                font-size: 24px;
            }

            p {
                color: #6b6b6b;
                line-height: 1.5;
            }

            button {
                margin-top: 18px;
                border: none;
                background: #c9a227;
                color: #ffffff;
                padding: 12px 18px;
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="icon">!</div>
            <h1>Sin conexión</h1>
            <p>
                No pudimos conectar con BarberCore. Revisa tu conexión a
                internet e intenta nuevamente.
            </p>
            <button onclick="window.location.reload()">Reintentar</button>
        </div>
    </body>
</html>
